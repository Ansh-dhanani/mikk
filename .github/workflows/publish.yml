name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (all, core, intent-engine, diagram-generator, watcher, ai-context, cli)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - core
          - intent-engine
          - diagram-generator
          - watcher
          - ai-context
          - cli

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Publish in dependency order (uses OIDC Trusted Publisher — no token needed)
      - name: Publish @getmikk/core
        if: ${{ inputs.package == 'all' || inputs.package == 'core' }}
        run: cd packages/core && npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Publish @getmikk/intent-engine
        if: ${{ inputs.package == 'all' || inputs.package == 'intent-engine' }}
        run: cd packages/intent-engine && npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Publish @getmikk/diagram-generator
        if: ${{ inputs.package == 'all' || inputs.package == 'diagram-generator' }}
        run: cd packages/diagram-generator && npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Publish @getmikk/watcher
        if: ${{ inputs.package == 'all' || inputs.package == 'watcher' }}
        run: cd packages/watcher && npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Publish @getmikk/ai-context
        if: ${{ inputs.package == 'all' || inputs.package == 'ai-context' }}
        run: cd packages/ai-context && npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Publish @getmikk/cli
        if: ${{ inputs.package == 'all' || inputs.package == 'cli' }}
        run: cd packages/cli && npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: true
