name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - core
          - intent-engine
          - diagram-generator
          - watcher
          - ai-context
          - cli
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure clean git state
        run: |
          git checkout -- bun.lock 2>/dev/null || true
          git diff --quiet || (echo "Uncommitted changes detected:" && git diff --name-only && exit 1)

      - name: Bump versions
        id: versions
        run: |
          node -e "
            const fs = require('fs');
            const bump = '${{ inputs.version_bump }}';
            const pkgs = [
              'packages/core', 'packages/intent-engine', 'packages/diagram-generator',
              'packages/watcher', 'packages/ai-context', 'packages/cli'
            ];
            const sel = '${{ inputs.package }}';
            const names = {
              'core': 'packages/core',
              'intent-engine': 'packages/intent-engine',
              'diagram-generator': 'packages/diagram-generator',
              'watcher': 'packages/watcher',
              'ai-context': 'packages/ai-context',
              'cli': 'packages/cli'
            };
            const targets = sel === 'all' ? pkgs : [names[sel]].filter(Boolean);
            for (const p of targets) {
              const path = p + '/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              const [ma, mi, pa] = pkg.version.split('.').map(Number);
              if (bump === 'major') pkg.version = (ma+1) + '.0.0';
              else if (bump === 'minor') pkg.version = ma + '.' + (mi+1) + '.0';
              else pkg.version = ma + '.' + mi + '.' + (pa+1);
              fs.writeFileSync(path, JSON.stringify(pkg, null, 4) + '\n');
              console.log('Bumped', pkg.name, 'to', pkg.version);
            }
          "
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check for duplicate versions
        run: |
          check() {
            local pkg=$1
            local dir=$2
            local name=$3
            if [ "${{ inputs.package }}" = "all" ] || [ "${{ inputs.package }}" = "$pkg" ]; then
              local v=$(node -p "require('./$dir/package.json').version")
              if npm view "$name@$v" version 2>/dev/null | grep -q "$v"; then
                echo "❌ $name@$v is already published. Aborting."
                exit 1
              fi
              echo "✅ $name@$v is safe to publish"
            fi
          }
          check core              packages/core              @getmikk/core
          check intent-engine     packages/intent-engine     @getmikk/intent-engine
          check diagram-generator packages/diagram-generator @getmikk/diagram-generator
          check watcher           packages/watcher           @getmikk/watcher
          check ai-context        packages/ai-context        @getmikk/ai-context
          check cli               packages/cli               @getmikk/cli

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git diff --staged --quiet || git commit -m "chore: release v${{ steps.versions.outputs.version }} (${{ inputs.version_bump }})"
          git push

      - name: Tag release
        run: |
          git tag "v${{ steps.versions.outputs.version }}"
          git push origin "v${{ steps.versions.outputs.version }}"

      - name: Replace workspace:* with real versions
        run: |
          node -e "
            const fs = require('fs');
            const pkgs = [
              'packages/core', 'packages/intent-engine', 'packages/diagram-generator',
              'packages/watcher', 'packages/ai-context', 'packages/cli'
            ];
            const versions = {};
            for (const p of pkgs) {
              const pkg = JSON.parse(fs.readFileSync(p + '/package.json', 'utf8'));
              versions[pkg.name] = pkg.version;
            }
            for (const p of pkgs) {
              const path = p + '/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              for (const field of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (!pkg[field]) continue;
                for (const [name, ver] of Object.entries(pkg[field])) {
                  if (ver === 'workspace:*' && versions[name]) {
                    pkg[field][name] = '^' + versions[name];
                  }
                }
              }
              fs.writeFileSync(path, JSON.stringify(pkg, null, 4) + '\n');
            }
            console.log('Replaced workspace:* with real versions:', versions);
          "

      - name: Dry-run publish (verify package contents)
        run: |
          dry() {
            local pkg=$1
            local dir=$2
            if [ "${{ inputs.package }}" = "all" ] || [ "${{ inputs.package }}" = "$pkg" ]; then
              echo "--- Dry run: $dir ---"
              cd $dir && npm publish --access public --dry-run && cd -
            fi
          }
          dry core              packages/core
          dry intent-engine     packages/intent-engine
          dry diagram-generator packages/diagram-generator
          dry watcher           packages/watcher
          dry ai-context        packages/ai-context
          dry cli               packages/cli

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish @getmikk/core
        if: ${{ inputs.package == 'all' || inputs.package == 'core' }}
        run: cd packages/core && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @getmikk/intent-engine
        if: ${{ inputs.package == 'all' || inputs.package == 'intent-engine' }}
        run: cd packages/intent-engine && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @getmikk/diagram-generator
        if: ${{ inputs.package == 'all' || inputs.package == 'diagram-generator' }}
        run: cd packages/diagram-generator && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @getmikk/watcher
        if: ${{ inputs.package == 'all' || inputs.package == 'watcher' }}
        run: cd packages/watcher && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @getmikk/ai-context
        if: ${{ inputs.package == 'all' || inputs.package == 'ai-context' }}
        run: cd packages/ai-context && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @getmikk/cli
        if: ${{ inputs.package == 'all' || inputs.package == 'cli' }}
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release summary
        if: always()
        run: |
          echo "## 🚀 Release v${{ steps.versions.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          for dir in packages/core packages/intent-engine packages/diagram-generator packages/watcher packages/ai-context packages/cli; do
            name=$(node -p "require('./$dir/package.json').name")
            ver=$(node -p "require('./$dir/package.json').version")
            echo "| \`$name\` | \`$ver\` |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🏷️ Git tag: \`v${{ steps.versions.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
