name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension
        run: cd packages/vscode-extension && bun run build

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Bump version
        id: bump
        run: |
          cd packages/vscode-extension
          npm version ${{ inputs.version_bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package extension
        run: cd packages/vscode-extension && vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        run: cd packages/vscode-extension && vsce publish --no-dependencies --pat ${{ secrets.VSCE_PAT }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/vscode-extension/package.json
          git commit -m "chore: bump vscode-extension to v${{ steps.bump.outputs.version }}"
          git push
