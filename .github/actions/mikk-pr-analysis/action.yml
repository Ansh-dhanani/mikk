name: 'Mikk PR Analysis'
description: 'Analyze codebase changes using Mikk and generate impact reports'
inputs:
  mikk-json-path:
    description: 'Path to mikk.json'
    required: false
    default: 'mikk.json'
  lock-json-path:
    description: 'Path to mikk.lock.json'
    required: false
    default: 'mikk.lock.json'
  comment-on-pr:
    description: 'Post results as PR comment'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install Mikk
      shell: bash
      run: |
        bun install -g @mikk/cli

    - name: Run Analysis
      shell: bash
      run: |
        mikk analyze
        mikk diff > /tmp/mikk-diff.txt
        echo "::set-output name=diff::$(cat /tmp/mikk-diff.txt)"

    - name: Generate Impact Report
      shell: bash
      run: |
        mikk context impact . > /tmp/mikk-impact.txt

    - name: Comment on PR
      if: inputs.comment-on-pr == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const diff = fs.readFileSync('/tmp/mikk-diff.txt', 'utf8');
          const impact = fs.readFileSync('/tmp/mikk-impact.txt', 'utf8');

          const body = `## 🔍 Mikk Analysis

          ### Changed Files
          \`\`\`
          ${diff}
          \`\`\`

          ### Impact Analysis
          \`\`\`
          ${impact}
          \`\`\`

          ---
          *Generated by [Mikk](https://github.com/mikk-dev/mikk)*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body
          });
