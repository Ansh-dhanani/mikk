<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="16" fill="#1e1e2e"/>
  <!-- central node -->
  <circle cx="50" cy="50" r="10" fill="#7c3aed"/>
  <!-- outer nodes -->
  <circle cx="20" cy="25" r="7" fill="#a78bfa"/>
  <circle cx="80" cy="25" r="7" fill="#a78bfa"/>
  <circle cx="20" cy="75" r="7" fill="#a78bfa"/>
  <circle cx="80" cy="75" r="7" fill="#a78bfa"/>
  <circle cx="50" cy="15" r="6" fill="#c4b5fd"/>
  <circle cx="50" cy="85" r="6" fill="#c4b5fd"/>
  <!-- edges -->
  <line x1="20" y1="25" x2="50" y2="50" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="25" x2="50" y2="50" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
  <line x1="20" y1="75" x2="50" y2="50" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="75" x2="50" y2="50" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
  <line x1="50" y1="15" x2="50" y2="50" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
  <line x1="50" y1="85" x2="50" y2="50" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
  <line x1="20" y1="25" x2="50" y2="15" stroke="#4c1d95" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="25" x2="50" y2="15" stroke="#4c1d95" stroke-width="1.5" opacity="0.5"/>
  <line x1="20" y1="75" x2="50" y2="85" stroke="#4c1d95" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="75" x2="50" y2="85" stroke="#4c1d95" stroke-width="1.5" opacity="0.5"/>
</svg>
